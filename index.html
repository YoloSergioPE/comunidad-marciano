/**-- LOADING CSS --*/
#loadingOverlay {

  width: 100%;
  height: 14px; /* 🔥 MÁS GRANDE */
  background: rgba(255,255,255,0.15);

  overflow: hidden;
  backdrop-filter: blur(6px);
}

/* PROGRESO */

  width: 0%;
  height: 100%;
  border-radius: 20px;

  <script>
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const preview = document.getElementById("photoPreview");
  const statusText = document.getElementById("status");

  const takeBtn = document.getElementById("takeBtn");
  const retakeBtn = document.getElementById("retakeBtn");
  const sendBtn = document.getElementById("sendBtn");
  const switchBtn = document.getElementById("switchBtn");
  const sendAudioBtn = document.getElementById("sendAudioBtn");

  const loadingScreen = document.getElementById("loadingScreen");
  const loadingText = document.getElementById("loadingText");
  const mainCard = document.getElementById("mainCard");
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

  let imageData = null;
  let currentFacing = "user";
  let stream = null;


  function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing, width:{ideal:1280}, height:{ideal:720} }
    }).then(s => {
      stream = s;
      video.srcObject = stream;
    });
  }

  function switchCamera() {
    currentFacing = currentFacing === "user" ? "environment" : "user";
    startCamera();
  }

  function takePhoto() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);

    imageData = canvas.toDataURL("image/jpeg", 0.9).split(",")[1];
    preview.src = "data:image/jpeg;base64," + imageData;

    video.style.display = "none";
    preview.style.display = "block";

    takeBtn.style.display = "none";
    switchBtn.style.display = "none";
    retakeBtn.style.display = "block";
    sendBtn.style.display = "block";
    sendBtn.disabled = false;



    statusText.innerText = "¿Te gusta la foto?";    
  }

  function retakePhoto() {
    imageData = null;

    preview.style.display = "none";
    video.style.display = "block";

    takeBtn.style.display = "block";
    switchBtn.style.display = "block";
    document.getElementById("galleryBtn").style.display = "block";

    retakeBtn.style.display = "none";
    sendBtn.style.display = "none";
    galleryInput.value = "";
    statusText.innerText = "";
    sendBtn.disabled = false;

  }


  function send() {
      console.log("CLICK SEND");

      const name = document.getElementById("name").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!imageData) {
        alert("Debes tomar o subir una foto");
        return;
      }

      // 🔥 ocultar UI
      mainCard.style.display = "none";

      // 🔥 iniciar loader (independiente del fetch)
      startLoader(() => {
        document.getElementById("loadingMessage").innerHTML = `
          <div class="finalCard">
            <img src="assets/logo.png" class="finalLogo">

            <h2>👽 Felicidades</h2>
            <p class="finalText">
              Tu saludo fue enviado correctamente. Únete a la Comunidad exclusiva del Marciano con los Links que te dejo aquí mi dey:
            </p>

            <div style="display:flex;flex-direction:column;gap:12px;margin-top:20px;">

              <a class="whatsapp-btn" target="_blank"
                href="https://chat.whatsapp.com/IviDOt7pRjbCywAfzSFe6d">
                Com. del Marciano 🚀
              </a>

              <a class="whatsapp-btn" target="_blank"
                href="https://chat.whatsapp.com/J6hiFg8LpgW6DkTp4BCPiU">
                Com. Marciano Vol.2 👽
              </a>

            </div>

            <p class="finalFooter">América Esports - 2026</p>
          </div>
        `;
      });

      // 🔥 desactivar botones (anti spam)
      if (sendBtn) sendBtn.disabled = true;
      const audioBtn = document.getElementById("sendAudioBtn");
      if (audioBtn) audioBtn.setAttribute("disabled", true);

      // 🔥 fetch en paralelo (NO bloquea UI)
      fetch("https://script.google.com/macros/s/AKfycbymto6TIdZTbYgeq3630YAbRG-5tilj0uPpuZfnW04pWJPWoZrZ533jZkPwAVc-X-kTWQ/exec", {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          type: "photo",
          name: name || "Anonimo",
          message: message || "",
          image: imageData
        })
      })
      .then(() => console.log("FETCH OK (photo)"))
      .catch(err => console.error("FETCH ERROR (photo):", err));
    }

  const galleryInput = document.getElementById("galleryInput");
  const galleryBtn = document.getElementById("galleryBtn");

  function openGallery() {
    galleryInput.click();
  }

  galleryInput.addEventListener("change", () => {
    const file = galleryInput.files[0];
    if (!file) return;

    if (!file.type.startsWith("image/")) {
      alert("Solo se permiten imágenes");
      return;
    }

    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(",")[1];
      imageData = base64;

      preview.src = reader.result;

      video.style.display = "none";
      preview.style.display = "block";

      takeBtn.style.display = "none";
      switchBtn.style.display = "none";
      galleryBtn.style.display = "none";

      retakeBtn.style.display = "block";
      sendBtn.style.display = "block";
      sendBtn.disabled = false; // ✅ FIX

      statusText.innerText = "Imagen cargada desde tu galería 📸";
    };

    reader.readAsDataURL(file);
  });

 function selectMode(mode) {

  const title = document.querySelector("h1");
  const subtitle = document.getElementById("subtitle");

  // Reset pantallas siempre primero
  document.getElementById("modeSelector").style.display = "none";
  document.getElementById("photoContent").style.display = "none";
  document.getElementById("audioContent").style.display = "none";

  /* ================= Concurso de KIA ================= */
  if(mode === "concurso"){
  title.innerText = "Concurso KIA 🚗";
  subtitle.innerText = "Sube tu captura y participa";

  document.getElementById("concursoContent").style.display = "block";
  return;
}
  /* ================= PHOTO ================= */
  if(mode === "photo"){
    title.innerText = "Saluda al Marciano";
    subtitle.innerText = "Elige cómo quieres enviar tu saludo";
    document.getElementById("photoContent").style.display = "block";
    startCamera();
    return;
  }

  /* ================= AUDIO ================= */
  if(mode === "audio"){
    title.innerText = "Saluda al Marciano";
    subtitle.innerText = "Elige cómo quieres enviar tu saludo";
    document.getElementById("audioContent").style.display = "block";
    startAudio();
    return;
  }

  }

    let mediaRecorder;
    let audioChunks = [];
    let audioBlob = null;
    let audioStream = null;

    function startAudio() {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(s => {
          audioStream = s;

          let options = {};
          if (MediaRecorder.isTypeSupported("audio/webm"))
            options.mimeType = "audio/webm";
          else if (MediaRecorder.isTypeSupported("audio/mp4"))
            options.mimeType = "audio/mp4";

          try{
            mediaRecorder = new MediaRecorder(s, options);
          }catch{
            // fallback iOS
            mediaRecorder = null;
          }
        });
    }

/* =========================================================================== */

    const iosAudioInput = document.getElementById("iosAudioInput");

    iosAudioInput.addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;

      audioBlob = file;

      const audioURL = URL.createObjectURL(file);
      const audioPreview = document.getElementById("audioPreview");

      audioPreview.src = audioURL;
      audioPreview.style.display = "block";
      sendAudioBtn.disabled = false;
      document.getElementById("sendAudioBtn").style.display = "block";
    });

    function startRecording() {
      if (isIOS) {
        iosAudioInput.click();
        return;
      }

      if (!mediaRecorder) return;

      audioChunks = [];
      mediaRecorder.start();

      document.getElementById("recordingIndicator").style.display = "flex";
      document.getElementById("stopBtn").disabled = false;
    }


    function stopRecording() {
      mediaRecorder.stop();

      document.getElementById("recordingIndicator").style.display = "none";
      document.getElementById("stopBtn").disabled = true;

      mediaRecorder.ondataavailable = e => {
        audioChunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        const mimeType = MediaRecorder.isTypeSupported("audio/webm")
          ? "audio/webm"
          : "audio/mp4";

        audioBlob = new Blob(audioChunks, { type: mimeType });


        const audioURL = URL.createObjectURL(audioBlob);
        const audioPreview = document.getElementById("audioPreview");

        audioPreview.src = audioURL;
        audioPreview.style.display = "block";
        sendAudioBtn.disabled = false;

        document.getElementById("sendAudioBtn").style.display = "block";
      };
    }

    function sendAudio() {
      mainCard.style.display = "none";
      loadingScreen.style.display = "flex";
      document.getElementById("progressBar").style.width = "0%";
      
      loadingText.innerText = "Procesando tu envío... 👽";
      document.getElementById("loadingActions").style.display = "none";


      const reader = new FileReader();

      reader.onload = () => {
        const base64Audio = reader.result.split(",")[1];

        sendBtn && (sendBtn.disabled = true);
        const audioBtn = document.getElementById("sendAudioBtn");
        if (audioBtn) audioBtn.setAttribute("disabled", true);

        fetch("https://script.google.com/macros/s/AKfycbymto6TIdZTbYgeq3630YAbRG-5tilj0uPpuZfnW04pWJPWoZrZ533jZkPwAVc-X-kTWQ/exec", {
          method: "POST",
          headers:{ "Content-Type":"text/plain;charset=utf-8" },
          body: JSON.stringify({
            type: "audio",
            name: document.getElementById("audioName").value || "Anonimo",
            audio: base64Audio
          })
        }).then(() => {
            loadingText.innerHTML = `
              Tus saludos han sido enviados mi marcianin 👽<br><br>
              <a class="whatsapp-btn" target="_blank"
                href="https://chat.whatsapp.com/IviDOt7pRjbCywAfzSFe6d">
                Unirme a la comunidad 🚀
              </a>
            `;

            document.getElementById("loadingActions").style.display = "block";
        });
      };

      reader.readAsDataURL(audioBlob);
    }

/* =========================================================================== */

      /* FUNCION LOADING*/
      let loaderInterval;

      function startLoader(callback) {
        const overlay = document.getElementById("loadingOverlay");
        const fill = document.getElementById("loaderFill");
        const bar = document.querySelector(".loaderBar");

        overlay.style.display = "flex";
        fill.style.width = "0%";

        let progress = 0;

        loaderInterval = setInterval(() => {
          progress += 2.25;

          if (progress >= 100) {
            progress = 100;
            fill.style.width = "100%";

            clearInterval(loaderInterval);

            // 🔥 ESPERA PEQUEÑA PARA EFECTO FINAL
            setTimeout(() => {

              // 🔥 OCULTA LA BARRA
              if (bar) bar.style.display = "none";

              callback();

            }, 300);

            return;
          }

          fill.style.width = progress + "%";

        }, 100);
      }
