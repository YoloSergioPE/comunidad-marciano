<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Saluda al Marciano</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    video, canvas {
      width: 100%;
      max-width: 320px;
      border-radius: 10px;
      margin: 10px 0;
    }

    input, textarea, button {
      width: 100%;
      max-width: 320px;
      margin: 6px auto;
      padding: 10px;
      border-radius: 6px;
      border: none;
      display: block;
    }

    button {
      background: #1f8bff;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #555;
    }
  </style>
</head>
<body>

  <h2>📸 Saluda al Marciano</h2>
  <p>Déjale tu foto y mensaje</p>

  <input type="text" id="name" placeholder="Tu nombre" />
  <textarea id="message" placeholder="Tu mensaje"></textarea>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>

  <button onclick="takePhoto()">Tomar foto</button>
  <button id="sendBtn" onclick="send()" disabled>Enviar saludo</button>

  <p id="status"></p>

<script>
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const sendBtn = document.getElementById("sendBtn");
  const statusText = document.getElementById("status");

  let imageData = null;

  // Abrir cámara
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      video.srcObject = stream;
    })
    .catch(() => {
      alert("No se pudo acceder a la cámara");
    });

  function takePhoto() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);
    imageData = canvas.toDataURL("image/jpeg").split(",")[1];
    sendBtn.disabled = false;
    statusText.innerText = "Foto capturada ✔";
  }

  function send() {
    const name = document.getElementById("name").value || "Anonimo";
    const message = document.getElementById("message").value || "";

    if (!imageData) {
      alert("Toma una foto primero");
      return;
    }

    sendBtn.disabled = true;
    statusText.innerText = "Enviando saludo al Marciano...";

    fetch("TU_URL_DE_APPS_SCRIPT", {
      method: "POST",
      body: JSON.stringify({
        name: name,
        message: message,
        image: imageData
      })
    })
    .then(res => res.json())
    .then(() => {
      statusText.innerText = "¡Saludo enviado! 👽";
    })
    .catch(() => {
      statusText.innerText = "Error al enviar";
      sendBtn.disabled = false;
    });
  }
</script>

</body>
</html>
