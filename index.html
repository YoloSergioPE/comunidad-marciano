<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Saluda al Marciano</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)),
        url("assets/fondo.jpg") center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.08),
        rgba(255,255,255,0.02)
      );
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 18px;
      padding: 24px 20px 26px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 20px 40px rgba(0,0,0,0.55),
        inset 0 0 0 1px rgba(255,255,255,0.03);
      text-align: center;
    }

    .logo {
      width: 90px;
      margin: 0 auto 10px;
      border-radius: 18px;
    }

    h1 {
      font-size: 1.6rem;
      margin: 6px 0 4px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #cfd3ff;
      margin-bottom: 18px;
    }

    input, textarea {
      width: 100%;
      border-radius: 10px;
      border: none;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.95);
    }

    textarea {
      resize: none;
      min-height: 70px;
    }

    video, img.preview {
      width: 100%;
      border-radius: 14px;
      margin: 12px 0;
      background: #000;
    }

    button {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      background: linear-gradient(135deg, #1f8bff, #5f9dff);
      color: #fff;
      box-shadow: 0 8px 18px rgba(31,139,255,0.35);
    }

    button:disabled {
      background: #555;
      box-shadow: none;
      cursor: not-allowed;
    }

    .secondary {
      background: linear-gradient(135deg, #2b2b38, #3a3a4f);
    }

    #status {
      margin-top: 12px;
      font-size: 0.9rem;
      min-height: 18px;
      color: #aee0ff;
    }

    /* LOADING */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95));
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      text-align: center;
      padding: 20px;
    }

    .loading-box h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .whatsapp-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #25D366, #1ebe5d);
    }
  </style>
</head>

<body>

<div class="card" id="mainCard">
  <img src="assets/logo.png" class="logo" alt="El Marciano">
  <h1>Saluda al Marciano</h1>
  <p class="subtitle">Déjale tu foto y mensaje a la comunidad</p>

  <input id="name" placeholder="Tu nombre / de donde nos ves">
  <textarea id="message" placeholder="Tu mensaje para El Marciano"></textarea>

  <video id="video" autoplay playsinline></video>
  <img id="photoPreview" class="preview" style="display:none;" />

  <canvas id="canvas" style="display:none;"></canvas>
  <input 
    type="file" 
    id="galleryInput" 
    accept="image/*"
    style="display:none;"
  >
  <button class="secondary" onclick="switchCamera()" id="switchBtn">Cambiar cámara</button>
  <button onclick="takePhoto()" id="takeBtn">Tomar foto</button>
  <button class="secondary" onclick="openGallery()" id="galleryBtn">
    Subir desde galería
  </button>

  <button onclick="retakePhoto()" id="retakeBtn" style="display:none;">Hacer nueva foto</button>
  <button onclick="send()" id="sendBtn" style="display:none;">Enviar saludo</button>

  <div id="status"></div>
</div>

<div id="loadingScreen">
  <div class="loading-box">
    <h2 id="loadingText">Enviando tu saludo marcianin 👽</h2>
    <p>América Esports - 2026</p>
  </div>
</div>

<script>
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const preview = document.getElementById("photoPreview");
  const statusText = document.getElementById("status");

  const takeBtn = document.getElementById("takeBtn");
  const retakeBtn = document.getElementById("retakeBtn");
  const sendBtn = document.getElementById("sendBtn");
  const switchBtn = document.getElementById("switchBtn");

  const loadingScreen = document.getElementById("loadingScreen");
  const loadingText = document.getElementById("loadingText");
  const mainCard = document.getElementById("mainCard");

  let imageData = null;
  let currentFacing = "user";
  let stream = null;

  function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing, width:{ideal:1280}, height:{ideal:720} }
    }).then(s => {
      stream = s;
      video.srcObject = stream;
    });
  }

  function switchCamera() {
    currentFacing = currentFacing === "user" ? "environment" : "user";
    startCamera();
  }

  function takePhoto() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);

    imageData = canvas.toDataURL("image/jpeg", 0.9).split(",")[1];
    preview.src = "data:image/jpeg;base64," + imageData;

    video.style.display = "none";
    preview.style.display = "block";

    takeBtn.style.display = "none";
    switchBtn.style.display = "none";
    retakeBtn.style.display = "block";
    sendBtn.style.display = "block";

    statusText.innerText = "¿Te gusta la foto?";
  }

  function retakePhoto() {
    imageData = null;

    preview.style.display = "none";
    video.style.display = "block";

    takeBtn.style.display = "block";
    switchBtn.style.display = "block";
    galleryBtn.style.display = "block";

    retakeBtn.style.display = "none";
    sendBtn.style.display = "none";

    galleryInput.value = "";
    statusText.innerText = "";
  }


  function send() {
    mainCard.style.display = "none";
    loadingScreen.style.display = "flex";

    fetch("https://script.google.com/macros/s/AKfycbxagFjt0W_gdtzTn8K4vIAMba5zHbISptSmge9LfGVxm6t-CUJ2UYgMOv2CxnddPgxQGw/exec", {
      method: "POST",
      body: JSON.stringify({
        name: document.getElementById("name").value || "Anonimo",
        message: document.getElementById("message").value || "",
        image: imageData
      })
    }).then(() => {
      loadingText.innerHTML = `
        Tus saludos han sido enviados mi marcianin 👽<br><br>
        <a class="whatsapp-btn" target="_blank"
           href="https://chat.whatsapp.com/IviDOt7pRjbCywAfzSFe6d">
           Unirme a la comunidad 🚀
        </a>
      `;
    });
  }

  const galleryInput = document.getElementById("galleryInput");
  const galleryBtn = document.getElementById("galleryBtn");

  function openGallery() {
    galleryInput.click();
  }

  galleryInput.addEventListener("change", () => {
    const file = galleryInput.files[0];
    if (!file) return;

    if (!file.type.startsWith("image/")) {
      alert("Solo se permiten imágenes");
      return;
    }

    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(",")[1];
      imageData = base64;

      preview.src = reader.result;

      video.style.display = "none";
      preview.style.display = "block";

      takeBtn.style.display = "none";
      switchBtn.style.display = "none";
      galleryBtn.style.display = "none";

      retakeBtn.style.display = "block";
      sendBtn.style.display = "block";

      statusText.innerText = "Imagen cargada desde tu galería 📸";
    };

    reader.readAsDataURL(file);
  });

  startCamera();
</script>

</body>
</html>
